# Dual-EA (full-space + diagonal-offset block LoRA) + DE - CEC f1-f15; additive subspace assignment.
# Fixed lora_blocks=10; swept seeds and lora rank (1, 2, 4); F=0.5, CR=0.9.
#
# From repo root:
#   wandb sweep configs/cec2013lsgo/d1000/dual_ea/lora_diag/de_static.yaml
#   wandb agent <entity>/<project>/<sweep_id>

name: cec2013-lsgo-dual-ea-lora-diag-de-static-d1000
project: evo-subspace-opt
# entity: your-team   # Optional; prefer env WANDB_ENTITY or: wandb sweep -e your-team ...

program: scripts/main_dual_ea.py
method: grid

metric:
  name: best_fitness
  goal: minimize

command:
  - ${env}
  - ${interpreter}
  - ${program}
  - ${args}
  - --wandb

parameters:
  wandb_project:
    value: evo-subspace-opt
  wandb_group:
    value: "{problem}-dim{dim}-dual_ea-{subspace_method}-lora_rank{lora_rank}-blocks{lora_blocks}-{subspace_assignment}-{sub_anchor_update}-{optimizer}-F{de_mut_rate}-CR{de_cr_rate}-multiseed"
  wandb_name:
    value: __auto__

  # --- swept ---
  lora_rank:
    values:
      - 1
      - 2
      - 4
  problem:
    values:
      - cec2013_lsgo_f1
      - cec2013_lsgo_f2
      - cec2013_lsgo_f3
      - cec2013_lsgo_f4
      - cec2013_lsgo_f5
      - cec2013_lsgo_f6
      - cec2013_lsgo_f7
      - cec2013_lsgo_f8
      - cec2013_lsgo_f9
      - cec2013_lsgo_f10
      - cec2013_lsgo_f11
      - cec2013_lsgo_f12
      - cec2013_lsgo_f13
      - cec2013_lsgo_f14
      - cec2013_lsgo_f15
  seed:
    values:
      - 0
      - 1
      - 2

  # --- fixed ---
  subspace_method:
    value: lora_diag
  lora_blocks:
    value: 10
  subspace_assignment:
    value: additive
  fullspace_assignment:
    value: absolute
  sub_anchor_update:
    value: reeval
  dim:
    value: 1000
  subspace_device:
    value: cuda:0
  optimizer:
    value: de
  pop_size:
    value: 100
  init_pop:
    value: uniform
  de_mut_rate:
    value: 0.5
  de_cr_rate:
    value: 0.9
  de_evolving:
    value: false
  de_selection:
    value: rand
  de_n_diffs:
    value: 1
  de_jitter:
    value: false
  de_crossover:
    value: bin
  max_nfe:
    value: 3000000
  log_every:
    value: 1
